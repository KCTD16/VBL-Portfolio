<!DOCTYPE html>
<html lang="en" data-theme="option1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VBL | {{ bio.full_name }}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-primary: #ffffff; --text-primary: #000000; --border-color: rgba(0,0,0,0.08); }
        [data-theme='option1'] { --bg-primary: #0a0a0c; --text-primary: #ffffff; --border-color: rgba(255,255,255,0.1); }
        
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .hero-title { font-size: 5rem !important; }
            #custom-cursor { display: none !important; } /* Hide star on touch screens */
        }

        .film-grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.04; }
        
        @media (pointer: fine) { body, a, button, .project-card { cursor: none !important; } }
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 35px; height: 35px; background: white; pointer-events: none; 
            z-index: 10000; mix-blend-mode: difference; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            will-change: transform; transition: opacity 0.3s ease; opacity: 0;
        }

        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .font-editorial { font-family: 'Playfair Display', serif; }
        #lightbox { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="film-grain"></div>
    <div id="custom-cursor"></div>

    <nav class="fixed top-0 w-full z-[100] p-6 md:p-12 flex justify-between items-center mix-blend-difference text-white">
        <div class="font-editorial italic text-xl md:text-2xl">VBL</div>
        <div class="flex gap-6 md:gap-12 text-[9px] md:text-[10px] uppercase font-bold tracking-[0.3em]">
            <a href="/">Home</a>
            <a href="{{ url_for('archive') }}">Full Works</a>
            <a href="#content">Content</a>
        </div>
    </nav>

    <div id="lightbox" onclick="closeLightbox()"><div id="lightbox-content" class="w-full h-full flex items-center justify-center p-4"></div></div>

    <!-- Hero -->
    <section class="relative h-screen flex items-center justify-center bg-black px-6">
        <video id="hero-video" autoplay loop muted playsinline preload="auto" class="absolute inset-0 w-full h-full object-cover opacity-60">
            <source src="{{ bio.hero_video }}" type="video/mp4">
        </video>
        <h1 class="relative z-10 hero-title text-7xl md:text-9xl font-editorial italic tracking-tighter text-center">{{ bio.name }}</h1>
    </section>

    <!-- Archive -->
    <section id="gallery" class="py-20 md:py-32 px-6 md:px-12 bg-[var(--bg-secondary)]">
        <div class="max-w-6xl mx-auto">
            <div class="reveal flex justify-between items-end mb-12 md:mb-20 border-b border-[var(--border-color)] pb-6">
                <h2 class="text-3xl font-editorial italic">The Archive</h2>
                <a href="{{ url_for('archive') }}" class="text-[9px] uppercase tracking-widest opacity-60 border-b border-current pb-1">View All</a>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 md:gap-16">
                {% for project in projects %}
                <div class="reveal group cursor-pointer project-card" onclick="openLightbox('{{ project.is_video }}', '{{ project.video if project.is_video else project.image }}')">
                    <div class="aspect-[16/11] overflow-hidden bg-zinc-900 mb-6 shadow-2xl relative">
                        {% if project.is_video %}
                            <video loop muted playsinline preload="metadata" class="project-video-element w-full h-full object-cover md:grayscale group-hover:grayscale-0"><source src="{{ project.video }}" type="video/mp4"></video>
                            <div class="absolute top-4 right-4 text-white/50"><i class="fas fa-play text-[8px]"></i></div>
                        {% else %}
                            <img src="{{ project.image }}" loading="lazy" class="w-full h-full object-cover md:grayscale group-hover:grayscale-0 transition-transform duration-700 group-hover:scale-105">
                        {% endif %}
                    </div>
                    <h3 class="uppercase text-[11px] font-bold tracking-widest">{{ project.title }}</h3>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>

    <!-- Bio -->
    <section id="content" class="py-20 md:py-40 px-6 md:px-12 flex flex-col md:flex-row gap-12 md:gap-20 items-center md:items-start">
        <div class="reveal w-full md:w-1/3"><div class="aspect-[3/4] overflow-hidden shadow-2xl"><img src="{{ bio.content_photo }}" class="w-full h-full object-cover"></div></div>
        <div class="reveal flex-1 text-center md:text-left">
            <h2 class="text-5xl md:text-8xl font-editorial italic mb-8 leading-tight">Visions in <br>Motion.</h2>
            <p class="text-lg md:text-2xl font-light max-w-2xl text-zinc-400 leading-relaxed">{{ bio.bio }}</p>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-[var(--border-color)]">
        <div class="mb-10 flex justify-center gap-8 text-[10px] font-bold uppercase tracking-widest opacity-60">
            <a href="mailto:{{ bio.contact.email }}" class="hover:text-white transition">Email</a>
            <a href="{{ bio.contact.instagram }}" target="_blank" class="hover:text-white transition">Instagram</a>
        </div>
        <p class="text-[9px] uppercase tracking-[0.4em] opacity-30">© {{ bio.est_year }} Visuals By Laurine</p>
    </footer>

    <button onclick="toggleTheme()" class="fixed bottom-6 right-6 w-12 h-12 rounded-full bg-[var(--text-primary)] text-[var(--bg-primary)] flex items-center justify-center shadow-2xl z-[10000]">
        <i id="theme-icon" class="fas fa-moon text-sm"></i>
    </button>

    <script>
        const obs = new IntersectionObserver((es) => { es.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); }); }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
        
        // Video Scroll Observer for Mobile
        const videoObs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const vid = entry.target.querySelector('video');
                if (vid) {
                    if (entry.isIntersecting) vid.play().catch(() => {});
                    else vid.pause();
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.project-card').forEach(card => videoObs.observe(card));

        const cursor = document.getElementById('custom-cursor');
        let isHovering = false;
        document.addEventListener('mousemove', (e) => {
            cursor.style.opacity = '1';
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%) scale(${isHovering ? 1.5 : 1})`;
        });

        function openLightbox(isVid, src) {
            const lb = document.getElementById('lightbox');
            lb.style.display = 'flex';
            document.getElementById('lightbox-content').innerHTML = isVid === 'True' ? `<video controls autoplay class="max-w-full max-h-[80vh] shadow-2xl"><source src="${src}" type="video/mp4"></video>` : `<img src="${src}" class="max-w-full max-h-[80vh] object-contain">`;
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        
        document.querySelectorAll('a, button, .project-card').forEach(el => {
            el.onmouseenter = () => isHovering = true;
            el.onmouseleave = () => isHovering = false;
        });
        
        function toggleTheme() {
            const h = document.documentElement;
            const i = document.getElementById('theme-icon');
            if (h.getAttribute('data-theme') === 'option1') { h.setAttribute('data-theme', ''); i.className = 'fas fa-moon'; }
            else { h.setAttribute('data-theme', 'option1'); i.className = 'fas fa-sun'; }
        }
    </script>
</body>
</html>
