<!DOCTYPE html>
<html lang="en" data-theme="option1">
<head>
    <meta charset="UTF-8">
    <title>VBL | {{ bio.full_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #ffffff; --text-primary: #000000; --border-color: rgba(0,0,0,0.08); }
        [data-theme='option1'] { --bg-primary: #0a0a0c; --text-primary: #ffffff; --border-color: rgba(255, 255, 255, 0.1); }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; transition: all 0.5s ease; overflow-x: hidden; }
        @media (pointer: fine) { body, a, button, .project-card { cursor: none !important; } }
        #custom-cursor { position: fixed; top: 0; left: 0; width: 35px; height: 35px; background: white; pointer-events: none; z-index: 9999; mix-blend-mode: difference; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        .font-editorial { font-family: 'Playfair Display', serif; }
        #lightbox.hidden { display: none; }
        #lightbox { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body id="home">
    <div id="custom-cursor"></div>
    <nav class="fixed top-0 w-full z-[100] p-8 md:p-12 flex justify-between items-center mix-blend-difference text-white">
        <div class="font-editorial italic text-2xl">VBL</div>
        <div class="flex gap-8 text-[10px] uppercase font-bold tracking-[0.4em]">
            <a href="/">Home</a>
            <a href="/archive">Full Works</a>
            <a href="#content">Content</a>
        </div>
    </nav>
    <div id="lightbox" class="hidden" onclick="closeLightbox()"><div id="lightbox-content"></div></div>

    <!-- Hero -->
    <section class="relative h-screen flex items-center justify-center bg-black">
        <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover opacity-60">
            <source src="{{ bio.hero_video }}" type="video/mp4">
        </video>
        <h1 class="relative z-10 text-7xl md:text-9xl font-editorial italic tracking-tighter text-white">{{ bio.name }}</h1>
    </section>

    <!-- Archive Section (Home) -->
    <section id="gallery" class="py-32 px-6 md:px-12 bg-[var(--bg-secondary)]">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl font-editorial italic mb-20 border-b border-[var(--border-color)] pb-6">The Archive</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16">
                {% for project in projects %}
                <div class="group cursor-pointer project-card" onclick="openLightbox('{{ project.is_video }}', '{{ project.video if project.is_video else project.image }}')">
                    <div class="aspect-[16/11] overflow-hidden bg-zinc-900 mb-6 shadow-2xl relative">
                        {% if project.is_video %}
                            <video loop muted playsinline class="w-full h-full object-cover grayscale group-hover:grayscale-0"><source src="{{ project.video }}" type="video/mp4"></video>
                        {% else %}
                            <img src="{{ project.image }}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-transform duration-700 group-hover:scale-105">
                        {% endif %}
                    </div>
                    <h3 class="uppercase text-[11px] font-bold tracking-widest">{{ project.title }}</h3>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>

    <!-- Bio Section -->
    <section id="content" class="py-40 px-6 md:px-12 flex flex-col md:flex-row gap-20 items-start">
        <div class="w-full md:w-1/4"><div class="aspect-[3/4] overflow-hidden shadow-2xl border border-[var(--border-color)]"><img src="{{ bio.content_photo }}" class="w-full h-full object-cover"></div></div>
        <div class="md:pt-4">
            <h2 class="text-5xl md:text-8xl font-editorial italic mb-10 leading-tight">Visions in <br>Motion.</h2>
            <p class="text-xl md:text-2xl font-light max-w-2xl leading-relaxed">{{ bio.bio }}</p>
            <div class="mt-10 flex gap-8 text-[10px] uppercase tracking-widest opacity-40"><span>Manchester, UK</span><span>Est. {{ bio.est_year }}</span></div>
        </div>
    </section>

    <!-- B&W TOGGLE BUTTON -->
    <button onclick="toggleTheme()" class="fixed bottom-8 right-8 w-14 h-14 rounded-full bg-[var(--text-primary)] text-[var(--bg-primary)] flex items-center justify-center shadow-2xl z-[100] hover:scale-110 transition">
        <i id="theme-icon" class="fas fa-moon"></i>
    </button>

    <script>
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.opacity = '1';
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%) scale(${isHovering ? 1.6 : 1})`;
        });
        let isHovering = false;
        function openLightbox(isVid, src) {
            document.getElementById('lightbox').classList.remove('hidden');
            const content = document.getElementById('lightbox-content');
            content.innerHTML = isVid === 'True' ? `<video controls autoplay class="max-w-full max-h-[85vh]"><source src="${src}" type="video/mp4"></video>` : `<img src="${src}" class="max-w-full max-h-[85vh] object-contain">`;
        }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.getAttribute('data-theme') === 'option1') {
                html.setAttribute('data-theme', '');
                icon.className = 'fas fa-moon';
            } else {
                html.setAttribute('data-theme', 'option1');
                icon.className = 'fas fa-sun';
            }
        }
        document.querySelectorAll('.project-card').forEach(card => {
            const vid = card.querySelector('video');
            card.onmouseenter = () => { if(vid) vid.play(); isHovering = true; };
            card.onmouseleave = () => { if(vid) vid.pause(); isHovering = false; };
        });
        document.querySelectorAll('a, button').forEach(el => {
            el.onmouseenter = () => isHovering = true;
            el.onmouseleave = () => isHovering = false;
        });
    </script>
</body>
</html>
