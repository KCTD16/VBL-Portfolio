<!DOCTYPE html>
<html lang="en" data-theme="option1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBL | {{ bio.full_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #ffffff; --text-primary: #000000; --border-color: rgba(0,0,0,0.08); --accent: #FA7301; }
        [data-theme='option1'] { --bg-primary: #0a0a0c; --text-primary: #ffffff; --border-color: rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; transition: background-color 0.8s ease; overflow-x: hidden; }
        
        /* THE BRAND FONT: Bold, Italic, Tight Tracking */
        .font-brand { 
            font-family: 'Playfair Display', serif; 
            font-weight: 700; 
            font-style: italic; 
            letter-spacing: -0.05em; 
            line-height: 0.9;
        }

        #preloader { position: fixed; inset: 0; z-index: 20000; background: #000; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        .loader-text { font-family: 'Playfair Display'; font-style: italic; font-weight: 700; font-size: 2.5rem; color: white; animation: pulse 1.5s infinite; letter-spacing: -0.05em; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (pointer: fine) { body, a, button, .group, .cursor-pointer { cursor: none !important; } }
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 35px; height: 35px; background: white; pointer-events: none; 
            z-index: 10000; mix-blend-mode: difference; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            will-change: transform; transition: opacity 0.3s ease, width 0.3s, height 0.3s; opacity: 0;
        }
        .film-grain { position: fixed; inset: 0; pointer-events: none; z-index: 9999; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.04; }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        #lightbox { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; animation: marquee 30s linear infinite; }
        .parallax-img { transition: transform 0.1s ease-out; will-change: transform; }
    </style>
</head>
<body id="home">
    <div id="preloader"><div class="loader-text">VBL</div></div>
    <div class="film-grain"></div>
    <div id="custom-cursor"></div>

    <nav class="fixed top-0 w-full z-[100] p-8 md:p-12 flex justify-between items-center mix-blend-difference text-white">
        <!-- NAV LOGO MATCHED -->
        <div class="font-brand text-3xl md:text-4xl">VBL</div>
        
        <div class="flex gap-8 text-[10px] uppercase font-bold tracking-[0.4em]">
            <a href="/" class="nav-link">Home</a>
            <a href="{{ url_for('archive') }}" class="nav-link">Full Works</a>
            <a href="#content" class="nav-link">Content</a>
        </div>
    </nav>

    <div id="lightbox" onclick="closeLightbox()">
        <div id="lightbox-content" class="w-full h-full flex items-center justify-center p-6"></div>
        <div id="lightbox-meta" class="text-[10px] uppercase tracking-[0.5em] text-white/40 pb-10"></div>
    </div>

    <!-- Hero -->
    <section class="relative h-screen flex items-center justify-center bg-black">
        <video id="hero-video" autoplay loop muted playsinline preload="auto" class="absolute inset-0 w-full h-full object-cover opacity-60">
            <source src="{{ bio.hero_video }}" type="video/mp4">
        </video>
        <!-- HERO LOGO MATCHED -->
        <h1 class="relative z-10 text-8xl md:text-[12rem] font-brand text-white shadow-2xl">{{ bio.name }}</h1>
    </section>

    <div class="py-4 bg-white text-black overflow-hidden whitespace-nowrap">
        <div class="animate-marquee text-[9px] font-bold uppercase tracking-[0.6em]">
            MANCHESTER / LONDON / GLOBAL &nbsp;•&nbsp; AVAILABLE FOR C
