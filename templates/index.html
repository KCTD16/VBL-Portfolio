<!DOCTYPE html>
<html lang="en" data-theme="option1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBL | {{ bio.full_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #ffffff; --text-primary: #000000; --border-color: rgba(0,0,0,0.08); }
        [data-theme='option1'] { --bg-primary: #0a0a0c; --text-primary: #ffffff; --border-color: rgba(255, 255, 255, 0.1); }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; transition: background-color 0.8s ease; overflow-x: hidden; }
        @media (pointer: fine) { body, a, button, .group, .cursor-pointer { cursor: none !important; } }
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 35px; height: 35px; background: white; pointer-events: none; 
            z-index: 10000; mix-blend-mode: difference; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            will-change: transform; transition: opacity 0.3s ease; opacity: 0;
        }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .font-editorial { font-family: 'Playfair Display', serif; }
        #lightbox { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body id="home">
    <div id="custom-cursor"></div>
    <nav class="fixed top-0 w-full z-[100] p-8 md:p-12 flex justify-between items-center mix-blend-difference text-white">
        <div class="font-editorial italic text-2xl">VBL</div>
        <div class="flex gap-8 text-[10px] uppercase font-bold tracking-[0.4em]">
            <a href="/">Home</a>
            <a href="{{ url_for('archive') }}">Full Works</a>
            <a href="#content">Content</a>
        </div>
    </nav>

    <div id="lightbox" onclick="closeLightbox()"><div id="lightbox-content" class="w-full h-full flex items-center justify-center"></div></div>

    <!-- Hero -->
    <section class="relative h-screen flex items-center justify-center bg-black">
        <video id="hero-video" autoplay loop muted playsinline preload="auto" class="absolute inset-0 w-full h-full object-cover opacity-60">
            <source src="{{ bio.hero_video }}" type="video/mp4">
        </video>
        <h1 class="relative z-10 text-7xl md:text-9xl font-editorial italic tracking-tighter text-white">{{ bio.name }}</h1>
    </section>

    <!-- Archive -->
    <section id="gallery" class="py-32 px-6 md:px-12 bg-[var(--bg-secondary)]">
        <div class="max-w-6xl mx-auto">
            <div class="reveal flex justify-between items-end mb-20 border-b border-[var(--border-color)] pb-6">
                <h2 class="text-3xl font-editorial italic">The Archive</h2>
                <p class="text-[10px] uppercase tracking-widest opacity-40">Selected Projects</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16">
                {% for project in projects %}
                <div class="reveal group cursor-pointer project-card" onclick="openLightbox('{{ project.is_video }}', '{{ project.video if project.is_video else project.image }}')">
                    <div class="aspect-[16/11] overflow-hidden bg-zinc-900 mb-6 shadow-2xl relative">
                        {% if project.is_video %}
                            <video loop muted playsinline class="w-full h-full object-cover grayscale group-hover:grayscale-0"><source src="{{ project.video }}" type="video/mp4"></video>
                        {% else %}
                            <img src="{{ project.image }}" loading="lazy" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-transform duration-700 group-hover:scale-105">
                        {% endif %}
                    </div>
                    <h3 class="uppercase text-[11px] font-bold tracking-widest">{{ project.title }}</h3>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>

    <!-- Bio -->
    <section id="content" class="py-40 px-6 md:px-12 flex flex-col md:flex-row gap-20 items-start">
        <div class="reveal w-full md:w-1/4"><div class="aspect-[3/4] overflow-hidden shadow-2xl"><img src="{{ bio.content_photo }}" class="w-full h-full object-cover"></div></div>
        <div class="reveal md:pt-4">
            <h2 class="text-5xl md:text-8xl font-editorial italic mb-10 leading-tight">Visions in <br>Motion.</h2>
            <p class="text-xl md:text-2xl font-light max-w-2xl text-zinc-400 leading-relaxed">{{ bio.bio }}</p>
        </div>
    </section>

    <!-- FOOTER REDESIGN -->
    <footer class="py-40 text-center border-t border-[var(--border-color)]">
        <div class="flex flex-col items-center gap-6">
            <p class="text-[10px] uppercase tracking-[0.5em] opacity-40 mb-2">Get in Touch</p>
            <span class="text-2xl md:text-4xl font-editorial italic tracking-tight">{{ bio.contact.email }}</span>
            <div class="w-12 h-[1px] bg-[var(--border-color)] my-4"></div>
            <a href="{{ bio.contact.instagram }}" target="_blank" class="text-[11px] uppercase tracking-[0.4em] font-bold hover:opacity-50 transition">
                Instagram: visualsbylaurine
            </a>
        </div>
    </footer>

    <button onclick="toggleTheme()" class="fixed bottom-8 right-8 w-14 h-14 rounded-full bg-[var(--text-primary)] text-[var(--bg-primary)] flex items-center justify-center shadow-2xl z-[10000] hover:scale-110 transition">
        <i id="theme-icon" class="fas fa-moon"></i>
    </button>

    <script>
        const obs = new IntersectionObserver((es) => { es.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); }); }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
        const cursor = document.getElementById('custom-cursor');
        let isHovering = false;
        document.addEventListener('mousemove', (e) => {
            cursor.style.opacity = '1';
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%) scale(${isHovering ? 1.6 : 1})`;
        });
        function openLightbox(isVid, src) {
            const lb = document.getElementById('lightbox');
            lb.style.display = 'flex';
            document.getElementById('lightbox-content').innerHTML = isVid === 'True' ? `<video controls autoplay class="max-w-full max-h-[85vh] shadow-2xl"><source src="${src}" type="video/mp4"></video>` : `<img src="${src}" class="max-w-full max-h-[85vh] object-contain">`;
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        document.querySelectorAll('.project-card').forEach(card => {
            const vid = card.querySelector('video');
            card.onmouseenter = () => { if(vid) vid.play(); isHovering = true; };
            card.onmouseleave = () => { if(vid) vid.pause(); isHovering = false; };
        });
        document.querySelectorAll('a, button').forEach(el => {
            el.onmouseenter = () => isHovering = true;
            el.onmouseleave = () => isHovering = false;
        });
        function toggleTheme() {
            const h = document.documentElement;
            const i = document.getElementById('theme-icon');
            if (h.getAttribute('data-theme') === 'option1') { h.setAttribute('data-theme', ''); i.className = 'fas fa-moon'; }
            else { h.setAttribute('data-theme', 'option1'); i.className = 'fas fa-sun'; }
        }
    </script>
</body>
</html>
