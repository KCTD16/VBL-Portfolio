<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full Works | VBL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0a0a0c; --text-color: #ffffff; }
        [data-theme='orange'] { --bg-color: #FA7301; --text-color: #000000; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Inter', sans-serif; transition: all 0.6s ease; overflow-x: hidden; }
        .font-editorial { font-family: 'Playfair Display', serif; }
        @media (pointer: fine) { body, a, button, .project-card { cursor: none !important; } }
        #custom-cursor { position: fixed; top: 0; left: 0; width: 35px; height: 35px; background: white; pointer-events: none; z-index: 9999; mix-blend-mode: difference; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        #lightbox.hidden { display: none; }
        #lightbox { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.98); display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="lightbox" class="hidden" onclick="closeLightbox()"><div id="lightbox-content"></div></div>
    
    <nav class="p-8 md:p-12 flex justify-between items-center w-full mix-blend-difference text-white">
        <a href="/" class="font-editorial italic text-2xl">VBL</a>
        <div class="flex gap-8 text-[10px] uppercase font-bold tracking-[0.4em]">
            <a href="/" class="opacity-50 hover:opacity-100 transition">Home</a>
            <span>Full Works</span>
        </div>
    </nav>

    <header class="px-8 md:px-12 py-20 border-b border-white/10">
        <h1 class="text-7xl md:text-9xl font-editorial italic tracking-tighter">Full Works.</h1>
    </header>

    <main class="px-4 md:px-8 py-12 pb-20">
        <div class="columns-1 sm:columns-2 lg:columns-3 gap-4 space-y-4">
            {% for project in projects %}
            <div class="project-card relative group break-inside-avoid cursor-pointer overflow-hidden bg-black/20" onclick="openLightbox('{{ project.is_video }}', '{{ project.video if project.is_video else project.image }}')">
                {% if project.is_video %}<video loop muted playsinline class="w-full"><source src="{{ project.video }}" type="video/mp4"></video>
                {% else %}<img src="{{ project.image }}" class="w-full transition-transform duration-700 group-hover:scale-105">{% endif %}
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6"><p class="text-[10px] uppercase tracking-widest font-bold text-white">{{ project.title }}</p></div>
            </div>{% endfor %}
        </div>
    </main>

    <!-- ORANGE TOGGLE -->
    <button onclick="toggleOrange()" class="fixed bottom-8 right-8 w-14 h-14 rounded-full bg-white text-black flex items-center justify-center shadow-2xl z-[100]"><i class="fas fa-palette"></i></button>

    <script>
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.opacity = '1';
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;
        });
        function openLightbox(isVid, src) {
            document.getElementById('lightbox').classList.remove('hidden');
            const content = document.getElementById('lightbox-content');
            content.innerHTML = isVid === 'True' ? `<video controls autoplay class="max-w-full max-h-[85vh] shadow-2xl"><source src="${src}" type="video/mp4"></video>` : `<img src="${src}" class="max-w-full max-h-[85vh] object-contain">`;
        }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
        function toggleOrange() { document.documentElement.getAttribute('data-theme') === 'orange' ? document.documentElement.setAttribute('data-theme', '') : document.documentElement.setAttribute('data-theme', 'orange'); }
        document.querySelectorAll('video').forEach(vid => {
            const card = vid.closest('.project-card');
            card.onmouseenter = () => vid.play();
            card.onmouseleave = () => vid.pause();
        });
    </script>
</body>
</html>
