<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Works | VBL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0a0a0c; --text-color: #ffffff; --border-color: rgba(255, 255, 255, 0.1); }
        [data-theme='orange'] { --bg-color: #FA7301; --text-color: #000000; --border-color: rgba(0, 0, 0, 0.1); }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Inter', sans-serif; transition: background-color 0.6s ease, color 0.6s ease; }
        .font-editorial { font-family: 'Playfair Display', serif; }
        @media (pointer: fine) { body, a, button, .project-card { cursor: none !important; } }
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 35px; height: 35px; background-color: white;
            pointer-events: none; z-index: 9999999; mix-blend-mode: difference; opacity: 0;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            will-change: transform; transition: opacity 0.3s ease;
        }
        #lightbox.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        #lightbox { transition: all 0.4s ease; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.98); display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="lightbox" class="hidden">
        <button onclick="closeLightbox()" class="absolute top-10 right-10 text-white z-[1001] hover:scale-125 transition"><i class="fas fa-times text-2xl"></i></button>
        <div id="lightbox-content" class="w-full h-full flex items-center justify-center"></div>
    </div>
    <nav class="p-8 md:p-12 flex justify-between items-center w-full mix-blend-difference">
        <a href="/" class="font-editorial italic text-2xl tracking-tighter">VBL</a>
        <div class="flex gap-8 text-[10px] uppercase tracking-[0.4em] font-bold"><a href="/" class="opacity-50 hover:opacity-100 transition">Home</a><span class="border-b border-current">Full Works</span></div>
    </nav>
    <header class="px-8 md:px-12 py-20 border-b border-white/10"><h1 class="text-7xl md:text-9xl font-editorial italic tracking-tighter">Full Works.</h1></header>
    <main class="px-4 md:px-8 py-12 pb-20"><div class="columns-1 sm:columns-2 lg:columns-3 gap-4 space-y-4">
        {% for project in projects %}
        <div class="project-card relative group break-inside-avoid cursor-pointer overflow-hidden bg-black/20" 
             onclick="openLightbox('{{ project.is_video }}', '{% if project.is_video %}{{ url_for('static', filename=project.video) }}{% else %}{% if 'http' in project.image %}{{ project.image }}{% else %}{{ url_for('static', filename=project.image) }}{% endif %}{% endif %}')">
            {% if project.is_video %}<video loop muted playsinline class="w-full transition-all duration-700"><source src="{{ url_for('static', filename=project.video) }}" type="video/mp4"></video><div class="absolute top-4 right-4 text-white/30"><i class="fas fa-play text-[8px]"></i></div>
            {% else %}<img src="{% if 'http' in project.image %}{{ project.image }}{% else %}{{ url_for('static', filename=project.image) }}{% endif %}" class="w-full group-hover:scale-105 transition-all duration-700">{% endif %}
            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6"><p class="text-[10px] uppercase tracking-widest font-bold text-white">{{ project.title }}</p></div>
        </div>{% endfor %}
    </div></main>
    <button onclick="toggleOrange()" class="fixed bottom-8 right-8 w-14 h-14 rounded-full bg-white text-black flex items-center justify-center shadow-2xl z-[100]"><i class="fas fa-palette"></i></button>
    <script>
        const cursor = document.getElementById('custom-cursor');
        let isHovering = false;
        document.addEventListener('mousemove', (e) => {
            cursor.style.opacity = '1';
            const x = e.clientX; const y = e.clientY;
            window.requestAnimationFrame(() => {
                cursor.style.transform = `translate3d(${x}px, ${y}px, 0) translate(-50%, -50%) scale(${isHovering ? 1.6 : 1}) rotate(${isHovering ? 144 : 0}deg)`;
            });
        });
        function openLightbox(isVideo, source) {
            document.getElementById('lightbox').classList.remove('hidden');
            const content = document.getElementById('lightbox-content');
            if (isVideo === 'True') { content.innerHTML = `<video controls autoplay class="max-w-full max-h-[85vh]"><source src="${source}" type="video/mp4"></video>`; }
            else { content.innerHTML = `<img src="${source}" class="max-w-full max-h-[85vh] object-contain">`; }
        }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
        function toggleOrange() { const html = document.documentElement; html.getAttribute('data-theme') === 'orange' ? html.setAttribute('data-theme', '') : html.setAttribute('data-theme', 'orange'); }
        document.querySelectorAll('a, button, .project-card').forEach(el => { el.onmouseenter = () => isHovering = true; el.onmouseleave = () => isHovering = false; });
        document.querySelectorAll('video').forEach(vid => {
            const card = vid.closest('.project-card');
            card.onmouseenter = () => { vid.play(); isHovering = true; };
            card.onmouseleave = () => { vid.pause(); isHovering = false; };
        });
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeLightbox(); });
    </script>
</body>
</html>
